<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
  <script src="cazando.js" defer></script>
  <script src="utils.js" defer></script>

</head>
<body onload="iniciarJuego();">

  <h1>Juego Cazando</h1>
  <p>Autor: Arturo Cueva</p>

  <div class="contenedor">
     <canvas id="areaJuego" width="500" height="500"></canvas>
  </div>


  <div class="controles">
    <button id="btnArriba" >⬆</button>
    <br>
    <button id="btnIzquierda">⬅</button>
    <button id="btnAbajo">⬇</button>
    <button id="btnDerecha">➡</button>
  </div>


  <div class="panel">
    <p>Puntos: <span id="spanPuntaje">0</span></p>
    <span>Tiempo: <span id="tiempo">10</span></span>
    <br>
      <button id="btnReiniciar">Restart </button>
  </div>

  <p id="mensaje"></p>


</body>
</html>
