<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
  <script src="cazando.js" defer></script>

</head>
<body>

  <h1>Juego Cazando</h1>
  <p>Autor: Arturo Cueva</p>

  <div class="contenedor">
     <canvas id="juego" width="600" height="400"></canvas>
  </div>


  <div class="controles">
    <button id="btnArriba" >⬆</button>
    <br>
    <button id="btnIzquierda">⬅</button>
    <button id="btnAbajo">⬇</button>
    <button id="btnDerecha">➡</button>
  </div>


  <div class="panel">
    <span>Puntos: <span id="puntos">0</span></span>
    <span>Tiempo: <span id="tiempo">10</span></span>
  </div>

  <p id="mensaje"></p>


</body>
</html>
