<!doctype html>
<html>
  <head>
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="cazando.js" defer></script>
    <script src="utils.js" defer></script>
  </head>
  <body onload="iniciarJuego()">
    <h1>🐱 Juego Cazando</h1>
    <p class="autor">Autor: Arturo Cueva</p>

    <div class="contenedor">
      <canvas id="areaJuego" width="500" height="500"></canvas>
    </div>

    <div id="panelMensaje">
      <p id="textoMensaje">¡A divertirnos!</p>
    </div>

    <div class="controles">
      <button id="btnArriba">⬆</button>
      <br />
      <button id="btnIzquierda">⬅</button>
      <button id="btnAbajo">⬇</button>
      <button id="btnDerecha">➡</button>
    </div>

    <div class="marcador">
      <span>🏆 Puntos: <span id="spanPuntaje">0</span></span>
      <span>⏱ Tiempo: <span id="tiempo">0</span></span>
    </div>

    <div class="reiniciar">
      <button id="btnReiniciar">🔄 Restart</button>
    </div>

    <p id="mensaje"></p>
  </body>
</html>
